<div class="chat-container">

  <div class="messages">
    <div *ngFor="let msg of messages" 
         [ngClass]="msg.role === 'user' ? 'user' : 'assistant'">
      {{ msg.content }}
    </div>

    <div *ngIf="loading" class="assistant">
      typing...
    </div>
  </div>

  <div class="input-box">
    <input [(ngModel)]="input" 
           (keyup.enter)="send()" 
           placeholder="Type a message..." />

    <button (click)="send()">Send</button>
  </div>

</div>
