<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button (click)="createSession()">+ New Chat</button>

    <div *ngFor="let s of sessions"
         (click)="selectSession(s)"
         class="session">
      {{ s.title }}
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat">

    <div class="messages">
      <div *ngFor="let m of messages"
           [class.user]="m.role==='user'"
           [class.bot]="m.role==='assistant'">

        <div [innerHTML]="renderMarkdown(m.content)"></div>
      </div>

      <div *ngIf="streaming" class="typing">
        assistant is typing...
      </div>
    </div>

    <div class="input">
      <input [(ngModel)]="input"
             (keyup.enter)="send()" />

      <button (click)="send()">Send</button>
      <button *ngIf="streaming" (click)="stop()">Stop</button>
    </div>

  </div>
</div>
